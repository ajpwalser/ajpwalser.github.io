<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
<head>
   <meta charset="utf-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <link rel="stylesheet" href="{{ '/css/style.css' | absolute_url }}">
   
   <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
   <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
   <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
   <link rel="manifest" href="/site.webmanifest">
   <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#000000">
   <meta name="msapplication-TileColor" content="#000000">
   <meta name="theme-color" content="#ffffff">

   {% seo %}
</head>
<body>
   <div class="container">
      
     
  
      
      
   <header>
      <ul>
          <li style="align-items:center;display:flex;flex-wrap:wrap;justify-content:space-between;margin-bottom:10px;">
      <h1 class="header"><a href="{{ site.baseurl | prepend: site.url }}/">{{ site.title }}</a><span><svg fill-rule="evenodd" stroke-linejoin="round" stroke-miterlimit="2" clip-rule="evenodd" viewBox="0 0 200 200">
  <path fill="darkorange" d="M200 38c0-21-17-38-38-38H38C17 0 0 17 0 38v124c0 21 17 38 38 38h124c21 0 38-17 38-38V38z"/>
  <circle cx="50" cy="150" fill="white" r="25"/>
  <path fill="#fff" d="M25 50V25c82 0 149 67 150 150h-25c0-69-56-125-125-125z"/>
  <path fill="white" d="M25 100V74c55 0 100 45 101 101h-26c0-42-34-75-75-75z"/>
</svg></span>
         </li>
         </ul>
         <br><aside>{{ site.tagline }}</aside>
      </h1>
      <hr>
   </header>
   <main aria-label="Content" role="main">
      {{ content }}
   </main>
   <footer>
      <hr>
        <ul>
         <li><a href="{{ site.baseurl | prepend: site.url }}/">Blog</a></li>
         <li><a href="{{ '/about/' | prepend: site.baseurl | prepend: site.url }}">About</a></li>
         <li><a href="{{ '/feed.xml' | prepend: site.baseurl | prepend: site.url }}">Feed</a></li>
        </ul>
   </footer>
      </div>
{% include new-window-fix.html %}
</body>
</html>
