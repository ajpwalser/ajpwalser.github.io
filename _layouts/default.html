<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
<head>
   <meta charset="utf-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <link rel="stylesheet" href="{{ '/css/style.css' | absolute_url }}">
   
   <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
   <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
   <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
   <link rel="manifest" href="/site.webmanifest">
   
   {% seo %}
</head>
<body>
   <div class="container">     
  <header role="banner">
    <h2>
    <a href="{{ site.baseurl | prepend: site.url }}/">{{ site.title }}</a>
    </h2>
    <hr>
    <nav>
        <a href="https://writxt.fun">What is Writxt?</a>
    </nav>
   </header>
   <main aria-label="Content" role="main">
      {{ content }}
   </main>
   <footer>
      <hr>
       <ul>
         <li style="align-items:center;display:flex;flex-wrap:wrap;justify-content:space-between;margin-bottom:10px;"><a href="{{ '/no-tracking' | prepend: site.baseurl | prepend: site.url }}">No Tracking.</a>
         <span><a href="{{ '/feed.xml' | prepend: site.baseurl | prepend: site.url }}">RSS</a></span></li>
       </ul>
      </footer> 
   </div>
{% include new-window-fix.html %}
</body>
</html>
