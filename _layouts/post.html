--- 
layout: default 
---

<article class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%B, %Y' }}</time> by {{ site.author }}</p>
  {{ content }}
</article>
<hr>
<footer>
<p class="footer">
  <nav>
    <ul id="menu">
        <li><a href="/">←&nbsp;Home</a></li>
    </ul>
  </nav>
</p>
</footer>
