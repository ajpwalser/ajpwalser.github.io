--- 
layout: default 
---

<article class="post">
  <h2 class="post-title">{{ page.title }}</h2>
  <p class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%B, %Y' }}</time></p>
  {{ content }}
  {% if page.applause_button %}
  <applause-button class="mb6"
    color={{ site.accent_color | default:'rgb(79,177,186)' }}
    url={{ post.url | absolute_url }} >
  </applause-button>
{% else %}
  <!-- original content of dingbat.html -->
{% endif %}
</article>
<hr>
<footer>
<p class="footer">
<a href="#" class="index-link">↑&nbsp;Top</a>
</p>
</footer>
