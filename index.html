---
layout: default
title: Home
description:
---
<h2>About</h2>
<blockquote>
<p>"He is so GREASY!"</p>
<span>~ Stanley "Stoney" Brown</span>
</blockquote>
<h2>Posts</h2>
<p>Read a random post.</p>
<div class="post-list">
  {% for post in site.posts %}
    <article role="article">
      <span class="created"><time datetime="{{ post.date | date_to_xmlschema }}" itemprop="datePublished">{{ post.date | date: '%m/%Y' }}</time> — <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></span>{% if post.applause_button %}<span class="clap-count" data-url="{{  site.baseurl }}{{ post.url  }}"></span>{% endif %}
    </article>
  {% endfor %}
</div>
<hr>
<footer>
<p class="footer">
  <nav><a href="#">↑&nbsp;Top</a><span>&nbsp;|&nbsp;</span><a href="/feed.xml">RSS</a></nav>
</p>
</footer>
