---
layout: default
title: Home
description:
---

<h1 style="font-size: 1.5em;">Posts</h1>
<p>Read a random post.</p>
<div class="post-list">
  {% for post in site.posts %}
    <article role="article">
      <span class="created"><time datetime="{{ post.date | date_to_xmlschema }}" itemprop="datePublished">{{ post.date | date: '%m/%Y' }}</time> — <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></span>
    </article>
  {% endfor %}
</div>
<hr>
<footer>
<p class="footer">
  <nav>
    <ul id="menu">
        <li>Except where otherwise noted, all content is licensed under a <a href="https://creativecommons.org/licenses/by/4.0/">Creative Commons Attribution 4.0 License</a>.</li>
    </ul>
  </nav>
</p>
</footer>
