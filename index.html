---
layout: default
title: Home
description:
---

<h1>Posts</h1>
<div class="post-list">
  {% for post in site.posts %}
    <article role="article">
      <ul>
      <li><time datetime="{{ post.date | date_to_xmlschema }}" itemprop="datePublished"><span class="tnum">{{ post.date | date: "%m/%Y" }}</span></time>
      <br><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
      </li>
      </ul>
    </article>
  {% endfor %}
</div>
<hr>
<footer>
<p class="footer">Footer</p>
</footer>
