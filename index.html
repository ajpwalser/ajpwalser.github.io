---
layout: default
title: Home
description:
---
<p>A blog.</p>
<h2>Posts</h2>
<p>Not sure where to start? Read a random post.</p>
<div class="post-list">
  {% for post in site.posts %}
    <article role="article">
      <span class="created"><time datetime="{{ post.date | date_to_xmlschema }}" itemprop="datePublished">{{ post.date | date: '%m/%Y' }}</time> — <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></span>
    </article>
  {% endfor %}
</div>
<hr>
<p class="footer">RSS</p>
