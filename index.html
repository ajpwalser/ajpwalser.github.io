---
layout: default
title: Home
description:
---
<h2>Posts</h2>
<p class="quarter-line-space">Not sure where to start? Read a random post.</p>
<div class="post-list">
  {% for post in site.posts %}
    <article role="article">
      <p><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></p>
      <time datetime="{{ post.date | date_to_xmlschema }}" itemprop="datePublished" class="post-date">{{ post.date | date: '%Y-%m-%d' }}</time>
    </article>
  {% endfor %}
</div>
<hr>
<p class="footer">RSS</p>
