---
layout: default
title: Home
description:
---

<h1 style="font-size: 1.5em;">Posts</h1>
<p>Read a random post.</p>
<div class="post-list">
  {% for post in site.posts %}
    <article role="article">
      <span class="created"><time datetime="{{ post.date | date_to_xmlschema }}" itemprop="datePublished">{{ post.date | date: '%m/%Y' }}</time> — <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></span>
    </article>
  {% endfor %}
</div>
<hr>
<footer>
<p class="footer">
  <nav><a href="#">🔝</a><span>&nbsp;|&nbsp;</span><a href="/feed.xml">RSS</a></nav>
</p>
</footer>
