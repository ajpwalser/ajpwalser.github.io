---
layout: default
title: Archive
description: All of Adam's posts
---

<h2>Archive</h2>
<p class="first">There is {{ site.posts.size }} post:</p>
<ul class="archive" style="list-style:none;padding:1rem 0;">
{% for post in site.posts %}
  <li>
    <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
    <time>{{ post.date | date: "%B %-d, %Y" }}</time>
  </li>
{% endfor %}
</ul>
<div class="spacer"></div>
